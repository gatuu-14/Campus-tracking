<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Logged Out — Campus Asset Tracker</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
</head>
<body class="bg-light d-flex flex-column justify-content-center align-items-center vh-100">

  <!-- Card -->
  <div class="card border p-4" style="max-width: 400px;">
    <div class="text-center">
      <i class="bi bi-box-arrow-right text-secondary display-1"></i>
      <h4 class="mt-3 fw-bold">You have been logged out</h4>
      <p class="text-secondary">Thank you for using Campus Asset Tracker.</p>
      <a href="{% url 'login' %}" class="btn btn-secondary mt-2">
        <i class="bi bi-box-arrow-in-right me-2"></i> Sign in again
      </a>
    </div>
  </div>

  <footer class="text-center mt-3 text-secondary">
    <small>&copy; {{ now.year }} Campus Asset Tracker</small>
  </footer>

</body>
</html>
